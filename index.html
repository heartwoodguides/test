<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midnight Rain</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Josefin+Sans:wght@100;300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --ink:   #060a10;
  --steel: #2a3f5c;
  --mist:  #4a6880;
  --rain:  #7aa8c8;
  --glow:  #a8d4f0;
}

html, body { width:100%; height:100%; background:var(--ink); overflow:hidden; font-family:'Josefin Sans',sans-serif; cursor:none; }

#sky { position:fixed; inset:0; background:linear-gradient(175deg,#040810 0%,#081422 40%,#0d1e35 70%,#0a1828 100%); transition:background 2.5s ease; }
#flash { position:fixed; inset:0; background:#c8e8ff; opacity:0; pointer-events:none; z-index:5; mix-blend-mode:screen; transition:opacity 0.05s; }

.cloud-layer { position:fixed; width:200%; height:60%; top:-10%; left:-50%; pointer-events:none; z-index:3; animation:cloudDrift 28s ease-in-out infinite alternate; }
.cloud-layer svg { width:100%; height:100%; }

#rain-canvas { position:fixed; inset:0; z-index:10; pointer-events:none; }
.fog { position:fixed; width:200%; height:300px; pointer-events:none; z-index:8; opacity:0.4; }
.fog-bottom { bottom:-80px; left:-50%; background:radial-gradient(ellipse at center, rgba(26,42,64,0.8) 0%, transparent 70%); animation:driftFog 18s ease-in-out infinite alternate; }

/* ── UI ── */
#ui { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; }

.title-block { text-align:center; margin-bottom:38px; animation:fadeUp 2s ease forwards; opacity:0; }
.eyebrow { font-weight:100; font-size:10px; letter-spacing:0.5em; color:var(--mist); text-transform:uppercase; margin-bottom:12px; }
h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(46px,7vw,84px); color:var(--glow); letter-spacing:0.04em; line-height:1; text-shadow:0 0 60px rgba(168,212,240,0.2); }
.subtitle { font-size:11px; font-weight:100; letter-spacing:0.35em; color:var(--mist); margin-top:10px; opacity:0.7; }

#play-btn { width:76px; height:76px; border-radius:50%; border:1px solid rgba(122,168,200,0.35); background:rgba(10,20,40,0.6); backdrop-filter:blur(8px); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.4s ease; animation:fadeUp 2s 0.3s ease forwards; opacity:0; position:relative; }
#play-btn::before { content:''; position:absolute; inset:-8px; border-radius:50%; border:1px solid rgba(122,168,200,0.12); transition:all 0.4s ease; }
#play-btn:hover { border-color:rgba(168,212,240,0.7); background:rgba(122,168,200,0.1); box-shadow:0 0 30px rgba(122,168,200,0.15); transform:scale(1.05); }
#play-btn:hover::before { inset:-14px; opacity:0.5; }

.controls { margin-top:38px; display:flex; flex-direction:column; align-items:center; gap:20px; animation:fadeUp 2s 0.5s ease forwards; opacity:0; }
.section-label { font-size:9px; letter-spacing:0.45em; color:var(--mist); text-transform:uppercase; }

/* Rain type buttons */
.rain-types { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:480px; }
.rain-type-btn {
  font-family:'Josefin Sans',sans-serif; font-weight:100; font-size:10px;
  letter-spacing:0.26em; text-transform:uppercase; color:var(--mist);
  background:transparent; border:1px solid rgba(74,104,128,0.28); border-radius:2px;
  padding:9px 16px; cursor:pointer; transition:all 0.3s ease; white-space:nowrap;
}
.rain-type-btn:hover { color:var(--rain); border-color:rgba(122,168,200,0.5); }
.rain-type-btn.active { color:var(--glow); border-color:rgba(168,212,240,0.65); background:rgba(122,168,200,0.09); box-shadow:0 0 16px rgba(122,168,200,0.08); }

/* Divider */
.divider { width:220px; height:1px; background:linear-gradient(90deg,transparent,rgba(74,104,128,0.22),transparent); }

/* Thunder toggle */
.thunder-row { display:flex; align-items:center; gap:20px; }
#thunder-toggle {
  font-family:'Josefin Sans',sans-serif; font-weight:100; font-size:10px;
  letter-spacing:0.26em; text-transform:uppercase; color:rgba(74,104,128,0.55);
  background:transparent; border:1px solid rgba(74,104,128,0.2); border-radius:2px;
  padding:9px 20px; cursor:pointer; transition:all 0.35s ease; white-space:nowrap;
}
#thunder-toggle:hover { color:var(--rain); border-color:rgba(122,168,200,0.45); }
#thunder-toggle.on { color:#ddeeff; border-color:rgba(200,230,255,0.55); background:rgba(180,220,255,0.07); box-shadow:0 0 18px rgba(180,220,255,0.1); }

/* Volume sliders */
.slider-row { display:flex; align-items:center; gap:14px; }
.slider-label { font-size:9px; letter-spacing:0.38em; color:var(--mist); text-transform:uppercase; width:72px; text-align:right; }
input[type=range] { -webkit-appearance:none; appearance:none; width:120px; height:1px; background:var(--steel); outline:none; cursor:pointer; transition:background 0.3s; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:10px; height:10px; border-radius:50%; background:var(--rain); box-shadow:0 0 8px rgba(122,168,200,0.5); transition:all 0.2s; }
input[type=range]:hover { background:var(--mist); }
input[type=range]:hover::-webkit-slider-thumb { background:var(--glow); transform:scale(1.3); }
#thunder-vol-row { opacity:0.3; pointer-events:none; transition:opacity 0.4s; }
#thunder-vol-row.active { opacity:1; pointer-events:auto; }

#status { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:0.45em; color:rgba(74,104,128,0.5); text-transform:uppercase; animation:pulse 4s ease-in-out infinite; white-space:nowrap; }

#cursor { position:fixed; width:6px; height:6px; border-radius:50%; background:rgba(168,212,240,0.6); pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:width 0.2s,height 0.2s; mix-blend-mode:screen; }
#cursor.big { width:30px; height:30px; background:rgba(168,212,240,0.08); border:1px solid rgba(168,212,240,0.35); }

@keyframes fadeUp    { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse     { 0%,100%{opacity:0.4} 50%{opacity:0.85} }
@keyframes driftFog  { from{transform:translateX(0)} to{transform:translateX(8%)} }
@keyframes cloudDrift{ from{transform:translateX(0)} to{transform:translateX(4%)} }
</style>
</head>
<body>

<div id="sky"></div>
<div id="flash"></div>

<div class="cloud-layer">
  <svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs>
      <filter id="b1"><feGaussianBlur stdDeviation="18"/></filter>
      <filter id="b2"><feGaussianBlur stdDeviation="28"/></filter>
      <filter id="b3"><feGaussianBlur stdDeviation="10"/></filter>
    </defs>
    <ellipse cx="200"  cy="120" rx="280" ry="110" fill="#0f1e32" filter="url(#b2)" opacity="0.95"/>
    <ellipse cx="700"  cy="80"  rx="340" ry="130" fill="#0d1c30" filter="url(#b2)" opacity="0.95"/>
    <ellipse cx="1100" cy="140" rx="220" ry="100" fill="#0f1e32" filter="url(#b2)" opacity="0.9"/>
    <ellipse cx="400"  cy="160" rx="200" ry="80"  fill="#111e2e" filter="url(#b1)" opacity="0.9"/>
    <ellipse cx="900"  cy="100" rx="260" ry="95"  fill="#10213a" filter="url(#b1)" opacity="0.85"/>
    <ellipse cx="150"  cy="200" rx="160" ry="55"  fill="#141f30" filter="url(#b3)" opacity="0.7"/>
    <ellipse cx="600"  cy="230" rx="300" ry="60"  fill="#131f31" filter="url(#b3)" opacity="0.65"/>
    <ellipse cx="1050" cy="195" rx="180" ry="58"  fill="#141f30" filter="url(#b3)" opacity="0.7"/>
  </svg>
</div>

<canvas id="rain-canvas"></canvas>
<div class="fog fog-bottom"></div>

<div id="ui">
  <div class="title-block">
    <p class="eyebrow">Ambient Soundscape</p>
    <h1>Midnight Rain</h1>
    <p class="subtitle" id="mode-subtitle">select a rain type below</p>
  </div>

  <button id="play-btn" aria-label="Play / Pause">
    <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="#a8d4f0" stroke="none"/></svg>
  </button>

  <div class="controls">
    <p class="section-label">Rain Type</p>
    <div class="rain-types">
      <button class="rain-type-btn active" data-type="drizzle">Drizzle</button>
      <button class="rain-type-btn" data-type="steady">Steady Rain</button>
      <button class="rain-type-btn" data-type="shower">Rain Shower</button>
      <button class="rain-type-btn" data-type="downpour">Downpour</button>
    </div>

    <div class="slider-row">
      <span class="slider-label">Rain Vol</span>
      <input type="range" id="rain-vol" min="0" max="100" value="70">
    </div>

    <div class="divider"></div>

    <div class="thunder-row">
      <p class="section-label">Thunder</p>
      <button id="thunder-toggle">Off</button>
    </div>

    <div class="slider-row" id="thunder-vol-row">
      <span class="slider-label">Thunder Vol</span>
      <input type="range" id="thunder-vol" min="0" max="100" value="55">
    </div>
  </div>
</div>

<p id="status">Click play to begin</p>
<div id="cursor"></div>

<script>
/* ═══ CURSOR ═══ */
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });
document.querySelectorAll('button,input').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('big'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

/* ═══ RAIN CONFIGS ═══ */
const TYPES = {
  drizzle:  { label:'Light Drizzle',   subtitle:'light drizzle · looping',   sky:'linear-gradient(175deg,#050a12 0%,#091520 40%,#0e1f32 70%,#0b1926 100%)', vis:{count:0.14,speed:[4,8],   len:[7,14],  alpha:[0.04,0.09],w:[0.3,0.55], angle:0.06}, sfx:{boost:0.7,lp:4000,lpQ:0.4,bp:1200,bpQ:0.3,hp:300,dropRate:0,dropAmp:0} },
  steady:   { label:'Steady Rain',     subtitle:'steady rain · looping',     sky:'linear-gradient(175deg,#040810 0%,#081422 40%,#0d1e35 70%,#0a1828 100%)', vis:{count:0.38,speed:[10,17], len:[14,25], alpha:[0.06,0.15],w:[0.5,0.9],  angle:0.15}, sfx:{boost:2.2,lp:4200,lpQ:0.8,bp:1300,bpQ:0.4,hp:280,dropRate:30,dropAmp:0.06} },
  shower:   { label:'Rain Shower',     subtitle:'rain shower · looping',     sky:'linear-gradient(175deg,#030609 0%,#060e1a 40%,#0b182e 70%,#081320 100%)', vis:{count:0.58,speed:[13,22], len:[18,34], alpha:[0.08,0.18],w:[0.55,1.05],angle:0.22}, sfx:{boost:3.2,lp:3600,lpQ:1.0,bp:980, bpQ:0.35,hp:160,dropRate:50,dropAmp:0.09} },
  downpour: { label:'Heavy Downpour',  subtitle:'heavy downpour · looping',  sky:'linear-gradient(175deg,#020407 0%,#050c16 40%,#091526 70%,#060e1c 100%)', vis:{count:0.95,speed:[20,34], len:[26,52], alpha:[0.10,0.26],w:[0.7,1.5],  angle:0.30}, sfx:{boost:5.5,lp:2600,lpQ:1.3,bp:650, bpQ:0.28,hp:60, dropRate:90,dropAmp:0.15} },
};

/* ═══ CANVAS ═══ */
const canvas = document.getElementById('rain-canvas');
const ctx    = canvas.getContext('2d');
let drops=[], W, H, currentType='drizzle', rainAlpha=0, targetAlpha=0, lastTime=0;

function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; buildDrops(); }
function buildDrops() {
  const v=TYPES[currentType].vis; drops=[];
  const n=Math.floor(W*v.count);
  for (let i=0;i<n;i++) drops.push(mkDrop(v,true));
}
function mkDrop(v,scatter) {
  const speed=v.speed[0]+Math.random()*(v.speed[1]-v.speed[0]);
  const len  =v.len[0]  +Math.random()*(v.len[1]  -v.len[0]);
  const alpha=v.alpha[0]+Math.random()*(v.alpha[1] -v.alpha[0]);
  const width=v.w[0]    +Math.random()*(v.w[1]     -v.w[0]);
  return { x:Math.random()*W, y:scatter?Math.random()*H:-len-Math.random()*40,
           vx:Math.sin(v.angle)*speed*0.6, vy:Math.cos(v.angle)*speed, len, alpha, width };
}

function drawRain(ts) {
  requestAnimationFrame(drawRain);
  const dt=Math.min((ts-lastTime)/16.67,3); lastTime=ts;
  rainAlpha+=(targetAlpha-rainAlpha)*0.05;
  ctx.clearRect(0,0,W,H);
  if (rainAlpha<0.01) return;
  const v=TYPES[currentType].vis;
  ctx.save(); ctx.globalAlpha=rainAlpha;
  for (let d of drops) {
    d.x+=d.vx*dt; d.y+=d.vy*dt;
    if (d.y>H+20||d.x>W+20) { Object.assign(d,mkDrop(v,false)); d.x=Math.random()*W; }
    const x2=d.x-d.vx/d.vy*d.len, y2=d.y-d.len;
    const g=ctx.createLinearGradient(x2,y2,d.x,d.y);
    g.addColorStop(0,'rgba(155,205,235,0)'); g.addColorStop(1,`rgba(155,205,235,${d.alpha})`);
    ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(d.x,d.y);
    ctx.strokeStyle=g; ctx.lineWidth=d.width; ctx.stroke();
  }
  ctx.restore();
}
window.addEventListener('resize',resize); resize(); requestAnimationFrame(drawRain);

/* ═══ AUDIO ═══ */
let actx, masterGain, thunderGainNode;
let playing=false, thunderOn=false;
let rainVol=0.70, thunderVol=0.55;
let stopRain=null, stopThunder=null;

function buildRainAudio(type) {
  const s=TYPES[type].sfx;
  const g=actx.createGain(); g.gain.setValueAtTime(0,actx.currentTime); g.connect(masterGain);
  let alive=true;
  const bufLen=actx.sampleRate*8;
  const buf=actx.createBuffer(2,bufLen,actx.sampleRate);
  for (let c=0;c<2;c++) {
    const d=buf.getChannelData(c); let last=0;
    for (let i=0;i<bufLen;i++) { const w=Math.random()*2-1; last=(last+0.03*w)/1.03; d[i]=last*s.boost; }
  }
  const noise=actx.createBufferSource(); noise.buffer=buf; noise.loop=true;
  const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=s.hp;
  const lp=actx.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value=s.lp; lp.Q.value=s.lpQ;
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=s.bp; bp.Q.value=s.bpQ;
  noise.connect(hp); hp.connect(lp); lp.connect(bp); bp.connect(g);
  noise.start();

  function dropTick() {
    if (!alive||s.dropRate===0) return;
    const t=actx.currentTime;
    const osc=actx.createOscillator(); const env=actx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(s.bp*(0.75+Math.random()*0.7),t);
    osc.frequency.exponentialRampToValueAtTime(s.bp*0.25,t+0.1);
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(s.dropAmp*(0.4+Math.random()*0.9),t+0.004);
    env.gain.exponentialRampToValueAtTime(0.0001,t+0.1+Math.random()*0.12);
    osc.connect(env); env.connect(g); osc.start(t); osc.stop(t+0.25);
    setTimeout(dropTick,(1000/s.dropRate)*(0.3+Math.random()*1.5));
  }
  dropTick();
  g.gain.setTargetAtTime(1,actx.currentTime,0.8);
  return ()=>{ alive=false; g.gain.setTargetAtTime(0,actx.currentTime,0.5); setTimeout(()=>{ try{noise.stop();g.disconnect();}catch(e){} },2000); };
}

function buildThunderAudio() {
  const g=actx.createGain(); g.gain.setValueAtTime(0,actx.currentTime); g.connect(actx.destination);
  thunderGainNode=g;
  let alive=true;

  function strike() {
    if (!alive) return;
    const t=actx.currentTime;

    const intensity = 0.6 + Math.random() * 0.4;
    const rumbleDur = 4 + Math.random() * 6;

    // ── 1. Initial crack — sharp broadband noise burst ──
    const crackLen = Math.floor(actx.sampleRate * 0.18);
    const crackBuf = actx.createBuffer(1, crackLen, actx.sampleRate);
    const crackData = crackBuf.getChannelData(0);
    for (let i = 0; i < crackLen; i++) crackData[i] = Math.random() * 2 - 1;
    const crackSrc = actx.createBufferSource(); crackSrc.buffer = crackBuf;
    // Shape: instant peak, very fast exponential decay
    const crackEnv = actx.createGain();
    crackEnv.gain.setValueAtTime(0, t);
    crackEnv.gain.linearRampToValueAtTime(intensity * 1.1, t + 0.002);
    crackEnv.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    // Bandpass to shape the crack timbre (not too harsh)
    const crackHp = actx.createBiquadFilter(); crackHp.type = 'highpass'; crackHp.frequency.value = 120;
    const crackLp = actx.createBiquadFilter(); crackLp.type = 'lowpass';  crackLp.frequency.value = 2200;
    crackSrc.connect(crackHp); crackHp.connect(crackLp); crackLp.connect(crackEnv); crackEnv.connect(g);
    crackSrc.start(t); crackSrc.stop(t + 0.2);

    // ── 2. Rolling rumble — brown noise, long tail ──
    const rumbleLen = Math.floor(actx.sampleRate * (rumbleDur + 1));
    const rumbleBuf = actx.createBuffer(2, rumbleLen, actx.sampleRate);
    for (let c = 0; c < 2; c++) {
      const d = rumbleBuf.getChannelData(c);
      let last = 0;
      for (let i = 0; i < rumbleLen; i++) {
        const w = Math.random() * 2 - 1;
        last = (last + 0.012 * w) / 1.012;
        d[i] = last * 18;
      }
    }
    const rumbleSrc = actx.createBufferSource(); rumbleSrc.buffer = rumbleBuf;
    const rumbleLp  = actx.createBiquadFilter(); rumbleLp.type = 'lowpass'; rumbleLp.frequency.value = 160; rumbleLp.Q.value = 0.6;
    const rumbleHp  = actx.createBiquadFilter(); rumbleHp.type = 'highpass'; rumbleHp.frequency.value = 25;
    const rumbleEnv = actx.createGain();
    // Starts just after crack, swells slightly then long exponential fade
    rumbleEnv.gain.setValueAtTime(0, t);
    rumbleEnv.gain.linearRampToValueAtTime(intensity * 0.55, t + 0.12);
    rumbleEnv.gain.linearRampToValueAtTime(intensity * 0.65, t + 0.5);
    rumbleEnv.gain.exponentialRampToValueAtTime(intensity * 0.2, t + rumbleDur * 0.4);
    rumbleEnv.gain.exponentialRampToValueAtTime(0.0001, t + rumbleDur);
    rumbleSrc.connect(rumbleHp); rumbleHp.connect(rumbleLp); rumbleLp.connect(rumbleEnv); rumbleEnv.connect(g);
    rumbleSrc.start(t); rumbleSrc.stop(t + rumbleDur + 0.2);

    // ── 3. Secondary echo rumble — distant reflection ──
    const echoDelay = 0.3 + Math.random() * 0.8;
    const echoLen   = Math.floor(actx.sampleRate * (rumbleDur * 0.7));
    const echoBuf   = actx.createBuffer(1, echoLen, actx.sampleRate);
    const echoData  = echoBuf.getChannelData(0);
    let eLast = 0;
    for (let i = 0; i < echoLen; i++) { const w = Math.random()*2-1; eLast=(eLast+0.015*w)/1.015; echoData[i]=eLast*14; }
    const echoSrc = actx.createBufferSource(); echoSrc.buffer = echoBuf;
    const echoLp  = actx.createBiquadFilter(); echoLp.type = 'lowpass'; echoLp.frequency.value = 90;
    const echoEnv = actx.createGain();
    const te = t + echoDelay;
    echoEnv.gain.setValueAtTime(0, te);
    echoEnv.gain.linearRampToValueAtTime(intensity * 0.28, te + 0.2);
    echoEnv.gain.exponentialRampToValueAtTime(0.0001, te + rumbleDur * 0.7);
    echoSrc.connect(echoLp); echoLp.connect(echoEnv); echoEnv.connect(g);
    echoSrc.start(te); echoSrc.stop(te + rumbleDur * 0.7 + 0.2);

    // Flash
    triggerFlash();

    setTimeout(strike,(8+Math.random()*24)*1000);
  }

  setTimeout(strike,(2+Math.random()*6)*1000);
  g.gain.setTargetAtTime(thunderVol,actx.currentTime,0.5);

  return ()=>{ alive=false; g.gain.setTargetAtTime(0,actx.currentTime,0.6); setTimeout(()=>{ try{g.disconnect();}catch(e){} },2500); };
}

function triggerFlash() {
  const flash=document.getElementById('flash');
  let t=0;
  const seq=[0.7,0.1,0.85,0,0.3,0];
  function step() {
    if (t>=seq.length) { flash.style.opacity=0; return; }
    flash.style.opacity=seq[t++];
    setTimeout(step, t===1?40:t===2?30:t===3?60:t===4?40:80);
  }
  step();
}

async function ensureAudio() {
  if (actx) return;
  actx=new (window.AudioContext||window.webkitAudioContext)();
  await actx.resume();
  masterGain=actx.createGain(); masterGain.gain.value=rainVol;
  masterGain.connect(actx.destination);
}

/* ═══ CONTROLS ═══ */
const playBtn  = document.getElementById('play-btn');
const status   = document.getElementById('status');
const subtitle = document.getElementById('mode-subtitle');

function setIcon(showPlay) {
  playBtn.querySelector('svg').innerHTML = showPlay
    ? `<polygon points="5,3 19,12 5,21" fill="#a8d4f0" stroke="none"/>`
    : `<rect x="5" y="3" width="4" height="18" fill="#a8d4f0" rx="1"/>
       <rect x="15" y="3" width="4" height="18" fill="#a8d4f0" rx="1"/>`;
}

playBtn.addEventListener('click', async () => {
  await ensureAudio();
  if (!playing) {
    playing=true; targetAlpha=1; setIcon(false);
    stopRain=buildRainAudio(currentType);
    if (thunderOn) stopThunder=buildThunderAudio();
    status.textContent='Playing · '+TYPES[currentType].label;
  } else {
    playing=false; targetAlpha=0; setIcon(true);
    if (stopRain)    { stopRain();    stopRain=null; }
    if (stopThunder) { stopThunder(); stopThunder=null; }
    status.textContent='Paused';
  }
});

document.querySelectorAll('.rain-type-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    await ensureAudio();
    document.querySelectorAll('.rain-type-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentType=btn.dataset.type;
    document.getElementById('sky').style.background=TYPES[currentType].sky;
    subtitle.textContent=TYPES[currentType].subtitle;
    buildDrops();
    if (playing) {
      if (stopRain) { stopRain(); stopRain=null; }
      stopRain=buildRainAudio(currentType);
      status.textContent='Playing · '+TYPES[currentType].label;
    }
  });
});

const thunderToggle   = document.getElementById('thunder-toggle');
const thunderVolRow   = document.getElementById('thunder-vol-row');

thunderToggle.addEventListener('click', async () => {
  await ensureAudio();
  thunderOn=!thunderOn;
  thunderToggle.textContent = thunderOn ? 'On' : 'Off';
  thunderToggle.classList.toggle('on', thunderOn);
  thunderVolRow.classList.toggle('active', thunderOn);
  if (thunderOn && playing) {
    stopThunder=buildThunderAudio();
  } else if (!thunderOn && stopThunder) {
    stopThunder(); stopThunder=null;
  }
});

document.getElementById('rain-vol').addEventListener('input', e => {
  rainVol=e.target.value/100;
  if (masterGain) masterGain.gain.setTargetAtTime(rainVol,actx.currentTime,0.1);
});

document.getElementById('thunder-vol').addEventListener('input', e => {
  thunderVol=e.target.value/100;
  if (thunderGainNode) thunderGainNode.gain.setTargetAtTime(thunderVol,actx.currentTime,0.1);
});
</script>
</body>
</html>
